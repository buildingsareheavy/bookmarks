<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Bookmarks</h1>
    <button id="add-new" command="show-modal" commandfor="add-new-dialog">
      Add New
    </button>
    <dialog id="add-new-dialog">
      <h2 id="dialog-title">Add New Bookmark</h2>
      <form id="add-new-form">
        <label for="add-title">Title</label>
        <input type="text" id="add-title" name="title" required />
        <label for="add-url">URL</label>
        <input
          type="url"
          id="add-url"
          name="url"
          pattern="https://.*/"
          required
        />
        <!-- combobox for tags later -->
        <button id="add-new-submit">Submit</button>
      </form>
      <button commandfor="add-new-dialog" command="close">Close</button>
    </dialog>
    <div class="filter-container">
      Filter:
      <select name="tags" id="tag-filter">
        <option value="all">all</option>
        <option value="art">art</option>
        <option value="coding">coding</option>
        <option value="news">news</option>
        <option value="reference">reference</option>
      </select>
    </div>
    <h2>List of Bookmarks</h2>
    <main></main>
    <div id="submit-popover" popover></div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
